<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Template 1</title>
</head>
<body>
    <div class="card" id="book-card">
        <!-- Do not hardcode the content here, use JavaScript -->
    </div>

    <script>
        const book = {
            "id": 42,
            "title": "The Hitchhiker's Guide to the Galaxy",
            "author": "Douglas Adams",
            "year": 1979,
            "genres": ["Science Fiction", "Comedy", "Adventure"],
            "pages": 224,
            "language": "English",
            "imageUrl": "https://images-na.ssl-images-amazon.com/images/I/81XSN3hA5gL.jpg"
        }

        // Your JavaScript here - populate the card with book data
        const card = document.getElementById('book-card');
        card.innerHTML = `
            <img src="${book.imageUrl}" alt="${book.title}">
            <h2>${book.title}</h2>
            <p><strong>Author:</strong> ${book.author}</p>
            <p><strong>Year:</strong> ${book.year}</p>
            <p><strong>Genres:</strong> ${book.genres.join(', ')}</p>
            <p><strong>Pages:</strong> ${book.pages}</p>
            <p><strong>Language:</strong> ${book.language}</p>
        `;
    </script>

    <style>
        /* Your CSS here
           Requirements:
           - Card width of 300px with a border
           - Text color #333
           - Title 1.5 times as big as base font
           - Headings should be uppercase
           - Use flexbox for layout
        */
        .card {
            width: 300px;
            border: 1px solid #ccc;
            padding: 16px;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .card h2 {
            font-size: 1.5em;
            text-transform: uppercase;
            text-align: center;
            margin: 16px 0;
        }
        .card img {
            max-width: 100%;
            height: auto;
        }
    </style>
</body>
</html>
